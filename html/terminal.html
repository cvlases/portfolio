<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Computer</title>
  <link rel="stylesheet" href="../css/terminal.css">
</head>
<body>
  <main class="computer-shell">
    <header class="computer-header">
      <div>
        <p class="computer-kicker">// system terminal</p>
        <h1>My Computer :) </h1>
      </div>
    </header>

    <section class="shortcut-bar">
      <button type="button" data-command="help">help</button>
      <button type="button" data-command="ls">ls</button>
      <button type="button" data-command="open about">open about</button>
      <button type="button" data-command="open portfolio">open portfolio</button>
      <button type="button" data-command="open planet">open planet</button>
      <button type="button" data-command="clear">clear</button>
    </section>

    <section id="terminal" class="terminal-window">
      <div id="output-container" class="output-container">
        <div id="output"></div>
      </div>
      <div id="input-line" class="input-line">
        <span class="prompt">guest@claire:~$</span>
        <input type="text" id="command-input" autocomplete="off" autofocus placeholder="Type help">
      </div>
    </section>
  </main>

  <script type="module" src="../js/terminal.js"></script>
</body>
</html>
