<!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <link rel="stylesheet" href="../css/wizard.css">
      <title>Wizard</title>
  </head>
  <body>
      <div class="wizard-window">

          <div class="wizard-titlebar">
              <span>Where do you want to go today?</span>
              <button class="wizard-close">✕</button>
          </div>

          <div class="wizard-body">
              <div class="wizard-left">
                    <div class="wizard-left">
            <img src="../assets/wizard.png" alt="">
        </div>
              </div>
              <div class="wizard-right">
                  <p class="wizard-prompt">What brings you here?</p>
                    <div class="role-options">
                        <label><input type="radio" name="role" value="art"> art</label>
                        <label><input type="radio" name="role" value="design"> design</label>
                        <label><input type="radio" name="role" value="coding"> coding</label>
                        <label><input type="radio" name="role" value="planet"> planet</label>
                        <label><input type="radio" name="role" value="research"> research</label>
                        <label><input type="radio" name="role" value="hobbies"> (worth) whiles</label>
                    </div>
              </div>
          </div>

          <div class="wizard-footer">
              <button class="wizard-next">Next →</button>
          </div>

      </div>
  </body>
  </html>
