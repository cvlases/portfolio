<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/art-board.css">
    <title>Art</title>
</head>
<body>
    <div class="art-page">
        <section class="art-hero">
            <div class="art-hero-copy">
                <p class="section-label">// art</p>
                <h1>Visual work, experiments, and image-making</h1>
                <p class="hero-note">A board of work across digital art, coding experiments, watercolor, botanical illustration, merch, and other visual side quests.</p>
            </div>
        </section>

        <section class="art-block">
            <div class="section-heading">
                <p class="section-label">// art board</p>
                <p class="section-note">A visual board of pieces, moods, mediums, and experiments.</p>
            </div>

            <div class="art-board">
                <div class="art-column">
                    <button type="button" class="art-tile tile-tall tone-rose" onclick="window.parent.openPopup('html/art/digital.html', 760, 620)">
                        <div class="tile-art"><span class="tile-kicker">digital</span></div>
                        <div class="tile-copy"><h2>dream fragment</h2></div>
                    </button>
                    <button type="button" class="art-tile tile-medium tone-sage" onclick="window.parent.openPopup('html/art/coding-art.html', 760, 620)">
                        <div class="tile-art"><span class="tile-kicker">coding</span></div>
                        <div class="tile-copy"><h2>coded texture</h2></div>
                    </button>
                    <button type="button" class="art-tile tile-small tone-wheat" onclick="window.parent.openPopup('html/art/watercolor.html', 760, 620)">
                        <div class="tile-art"><span class="tile-kicker">watercolor</span></div>
                        <div class="tile-copy"><h2>field study</h2></div>
                    </button>
                </div>

                <div class="art-column">
                    <button type="button" class="art-tile tile-medium tone-plum" onclick="window.parent.openPopup('html/art/merch.html', 760, 620)">
                        <div class="tile-art"><span class="tile-kicker">merch</span></div>
                        <div class="tile-copy"><h2>poster/shirt system</h2></div>
                    </button>
                    <button type="button" class="art-tile tile-tall tone-sky" onclick="window.parent.openPopup('html/art/botanical.html', 760, 620)">
                        <div class="tile-art"><span class="tile-kicker">botanical</span></div>
                        <div class="tile-copy"><h2>wildflower plate</h2></div>
                    </button>
                    <button type="button" class="art-tile tile-small tone-gold" onclick="window.parent.openPopup('html/art/published.html', 760, 620)">
                        <div class="tile-art"><span class="tile-kicker">published</span></div>
                        <div class="tile-copy"><h2>printed page</h2></div>
                    </button>
                </div>

                <div class="art-column">
                    <button type="button" class="art-tile tile-small tone-rose" onclick="window.parent.openPopup('html/art/digital.html', 760, 620)">
                        <div class="tile-art"><span class="tile-kicker">digital</span></div>
                        <div class="tile-copy"><h2>interface collage</h2></div>
                    </button>
                    <button type="button" class="art-tile tile-medium tone-plum" onclick="window.parent.openPopup('html/art/merch.html', 760, 620)">
                        <div class="tile-art"><span class="tile-kicker">graphic</span></div>
                        <div class="tile-copy"><h2>identity fragments</h2></div>
                    </button>
                    <button type="button" class="art-tile tile-tall tone-sage" onclick="window.parent.openPopup('html/art/coding-art.html', 760, 620)">
                        <div class="tile-art"><span class="tile-kicker">coding</span></div>
                        <div class="tile-copy"><h2>behavior study</h2></div>
                    </button>
                </div>

                <div class="art-column">
                    <button type="button" class="art-tile tile-tall tone-wheat" onclick="window.parent.openPopup('html/art/watercolor.html', 760, 620)">
                        <div class="tile-art"><span class="tile-kicker">watercolor</span></div>
                        <div class="tile-copy"><h2>fruit study</h2></div>
                    </button>
                    <button type="button" class="art-tile tile-small tone-sky" onclick="window.parent.openPopup('html/art/botanical.html', 760, 620)">
                        <div class="tile-art"><span class="tile-kicker">botanical</span></div>
                        <div class="tile-copy"><h2>specimen sheet</h2></div>
                    </button>
                    <button type="button" class="art-tile tile-medium tone-gold" onclick="window.parent.openPopup('html/art/published.html', 760, 620)">
                        <div class="tile-art"><span class="tile-kicker">published</span></div>
                        <div class="tile-copy"><h2>book spread</h2></div>
                    </button>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
